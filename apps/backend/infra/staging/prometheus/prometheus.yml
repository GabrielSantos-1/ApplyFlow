global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert-rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: applyflow-backend
    metrics_path: /actuator/prometheus
    scheme: http
    static_configs:
      - targets: ["backend-1:8080", "backend-2:8080"]
        labels:
          application: applyflow-jobcopilot
          env: staging
    http_headers:
      X-Actuator-Token:
        values: ["metrics-staging-token"]
