services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: applyflow
      POSTGRES_USER: applyflow
      POSTGRES_PASSWORD: applyflow
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U applyflow -d applyflow"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "no", "--save", ""]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend-1:
    build:
      context: ../..
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: staging
      DB_URL: jdbc:postgresql://postgres:5432/applyflow
      DB_USERNAME: applyflow
      DB_PASSWORD: applyflow
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ISSUER: applyflow
      JWT_AUDIENCE: applyflow-web
      JWT_SECRET_BASE64: ${JWT_SECRET_BASE64:?configure JWT_SECRET_BASE64 in ignored local env}
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      ACTUATOR_METRICS_TOKEN: ${ACTUATOR_METRICS_TOKEN:?configure ACTUATOR_METRICS_TOKEN in ignored local env}
      RATE_LIMIT_WINDOW_SECONDS: 60
      RATE_LIMIT_LOGIN_LIMIT: 8
      RATE_LIMIT_REFRESH_LIMIT: 12
      RATE_LIMIT_RESUME_VARIANT_LIMIT: 10
      RATE_LIMIT_APPLICATION_DRAFT_LIMIT: 12
      RATE_LIMIT_VACANCY_READ_LIMIT: 120
      RATE_LIMIT_AI_ENRICHMENT_LIMIT: ${RATE_LIMIT_AI_ENRICHMENT_LIMIT:-20}
      INGESTION_ENABLED: "true"
      INGESTION_SCHEDULER_ENABLED: ${INGESTION_SCHEDULER_ENABLED:-true}
      INGESTION_REMOTIVE_DELAY_MS: ${INGESTION_REMOTIVE_DELAY_MS:-43200000}
      INGESTION_BOOTSTRAP_ENABLED: ${INGESTION_BOOTSTRAP_ENABLED:-true}
      INGESTION_BOOTSTRAP_SOURCE: ${INGESTION_BOOTSTRAP_SOURCE:-REMOTIVE}
      INGESTION_BOOTSTRAP_MAX_JOBS_PER_RUN: ${INGESTION_BOOTSTRAP_MAX_JOBS_PER_RUN:-120}
      INGESTION_BOOTSTRAP_ONLY_WHEN_VACANCIES_EMPTY: ${INGESTION_BOOTSTRAP_ONLY_WHEN_VACANCIES_EMPTY:-true}
      INGESTION_BOOTSTRAP_REQUIRE_NO_RUNS: ${INGESTION_BOOTSTRAP_REQUIRE_NO_RUNS:-true}
      INGESTION_BOOTSTRAP_ALLOWED_PROFILES: ${INGESTION_BOOTSTRAP_ALLOWED_PROFILES:-staging}
      INGESTION_REMOTIVE_BASE_URL: ${INGESTION_REMOTIVE_BASE_URL:-https://remotive.com}
      INGESTION_REMOTIVE_ALLOWED_HOSTS: ${INGESTION_REMOTIVE_ALLOWED_HOSTS:-remotive.com}
      INGESTION_REMOTIVE_CONNECT_TIMEOUT_MS: ${INGESTION_REMOTIVE_CONNECT_TIMEOUT_MS:-2000}
      INGESTION_REMOTIVE_READ_TIMEOUT_MS: ${INGESTION_REMOTIVE_READ_TIMEOUT_MS:-5000}
      BOOTSTRAP_ADMIN_ENABLED: ${BOOTSTRAP_ADMIN_ENABLED:-false}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      BOOTSTRAP_ADMIN_FORCE_PASSWORD_RESET: ${BOOTSTRAP_ADMIN_FORCE_PASSWORD_RESET:-false}
      BOOTSTRAP_ADMIN_ALLOWED_PROFILES: ${BOOTSTRAP_ADMIN_ALLOWED_PROFILES:-staging}
      AI_ENABLED: ${AI_ENABLED:-false}
      AI_PROVIDER_NAME: ${AI_PROVIDER_NAME:-openai-compatible}
      AI_PROVIDER_BASE_URL: ${AI_PROVIDER_BASE_URL:-https://api.openai.com}
      AI_PROVIDER_CHAT_PATH: ${AI_PROVIDER_CHAT_PATH:-/v1/chat/completions}
      AI_PROVIDER_MODEL: ${AI_PROVIDER_MODEL:-gpt-4o-mini}
      AI_PROVIDER_API_KEY: ${AI_PROVIDER_API_KEY:-}
      AI_PROVIDER_CONNECT_TIMEOUT_MS: ${AI_PROVIDER_CONNECT_TIMEOUT_MS:-2000}
      AI_PROVIDER_READ_TIMEOUT_MS: ${AI_PROVIDER_READ_TIMEOUT_MS:-8000}
      AI_PROVIDER_MAX_RETRIES: ${AI_PROVIDER_MAX_RETRIES:-1}
      AI_PROVIDER_MAX_COMPLETION_TOKENS: ${AI_PROVIDER_MAX_COMPLETION_TOKENS:-400}
      AI_PROVIDER_TEMPERATURE: ${AI_PROVIDER_TEMPERATURE:-0.2}
      AI_PROVIDER_ALLOWED_HOSTS: ${AI_PROVIDER_ALLOWED_HOSTS:-api.openai.com}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8081:8080"

  backend-2:
    build:
      context: ../..
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: staging
      DB_URL: jdbc:postgresql://postgres:5432/applyflow
      DB_USERNAME: applyflow
      DB_PASSWORD: applyflow
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ISSUER: applyflow
      JWT_AUDIENCE: applyflow-web
      JWT_SECRET_BASE64: ${JWT_SECRET_BASE64:?configure JWT_SECRET_BASE64 in ignored local env}
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      ACTUATOR_METRICS_TOKEN: ${ACTUATOR_METRICS_TOKEN:?configure ACTUATOR_METRICS_TOKEN in ignored local env}
      RATE_LIMIT_WINDOW_SECONDS: 60
      RATE_LIMIT_LOGIN_LIMIT: 8
      RATE_LIMIT_REFRESH_LIMIT: 12
      RATE_LIMIT_RESUME_VARIANT_LIMIT: 10
      RATE_LIMIT_APPLICATION_DRAFT_LIMIT: 12
      RATE_LIMIT_VACANCY_READ_LIMIT: 120
      RATE_LIMIT_AI_ENRICHMENT_LIMIT: ${RATE_LIMIT_AI_ENRICHMENT_LIMIT:-20}
      INGESTION_ENABLED: "true"
      INGESTION_SCHEDULER_ENABLED: ${INGESTION_SCHEDULER_ENABLED:-true}
      INGESTION_REMOTIVE_DELAY_MS: ${INGESTION_REMOTIVE_DELAY_MS:-43200000}
      INGESTION_BOOTSTRAP_ENABLED: ${INGESTION_BOOTSTRAP_ENABLED:-true}
      INGESTION_BOOTSTRAP_SOURCE: ${INGESTION_BOOTSTRAP_SOURCE:-REMOTIVE}
      INGESTION_BOOTSTRAP_MAX_JOBS_PER_RUN: ${INGESTION_BOOTSTRAP_MAX_JOBS_PER_RUN:-120}
      INGESTION_BOOTSTRAP_ONLY_WHEN_VACANCIES_EMPTY: ${INGESTION_BOOTSTRAP_ONLY_WHEN_VACANCIES_EMPTY:-true}
      INGESTION_BOOTSTRAP_REQUIRE_NO_RUNS: ${INGESTION_BOOTSTRAP_REQUIRE_NO_RUNS:-true}
      INGESTION_BOOTSTRAP_ALLOWED_PROFILES: ${INGESTION_BOOTSTRAP_ALLOWED_PROFILES:-staging}
      INGESTION_REMOTIVE_BASE_URL: ${INGESTION_REMOTIVE_BASE_URL:-https://remotive.com}
      INGESTION_REMOTIVE_ALLOWED_HOSTS: ${INGESTION_REMOTIVE_ALLOWED_HOSTS:-remotive.com}
      INGESTION_REMOTIVE_CONNECT_TIMEOUT_MS: ${INGESTION_REMOTIVE_CONNECT_TIMEOUT_MS:-2000}
      INGESTION_REMOTIVE_READ_TIMEOUT_MS: ${INGESTION_REMOTIVE_READ_TIMEOUT_MS:-5000}
      BOOTSTRAP_ADMIN_ENABLED: ${BOOTSTRAP_ADMIN_ENABLED:-false}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      BOOTSTRAP_ADMIN_FORCE_PASSWORD_RESET: ${BOOTSTRAP_ADMIN_FORCE_PASSWORD_RESET:-false}
      BOOTSTRAP_ADMIN_ALLOWED_PROFILES: ${BOOTSTRAP_ADMIN_ALLOWED_PROFILES:-staging}
      AI_ENABLED: ${AI_ENABLED:-false}
      AI_PROVIDER_NAME: ${AI_PROVIDER_NAME:-openai-compatible}
      AI_PROVIDER_BASE_URL: ${AI_PROVIDER_BASE_URL:-https://api.openai.com}
      AI_PROVIDER_CHAT_PATH: ${AI_PROVIDER_CHAT_PATH:-/v1/chat/completions}
      AI_PROVIDER_MODEL: ${AI_PROVIDER_MODEL:-gpt-4o-mini}
      AI_PROVIDER_API_KEY: ${AI_PROVIDER_API_KEY:-}
      AI_PROVIDER_CONNECT_TIMEOUT_MS: ${AI_PROVIDER_CONNECT_TIMEOUT_MS:-2000}
      AI_PROVIDER_READ_TIMEOUT_MS: ${AI_PROVIDER_READ_TIMEOUT_MS:-8000}
      AI_PROVIDER_MAX_RETRIES: ${AI_PROVIDER_MAX_RETRIES:-1}
      AI_PROVIDER_MAX_COMPLETION_TOKENS: ${AI_PROVIDER_MAX_COMPLETION_TOKENS:-400}
      AI_PROVIDER_TEMPERATURE: ${AI_PROVIDER_TEMPERATURE:-0.2}
      AI_PROVIDER_ALLOWED_HOSTS: ${AI_PROVIDER_ALLOWED_HOSTS:-api.openai.com}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8082:8080"

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=3d"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../../ops/prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
    depends_on:
      - backend-1
      - backend-2
      - alertmanager
    ports:
      - "9090:9090"

  alertmanager:
    image: prom/alertmanager:v0.27.0
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
