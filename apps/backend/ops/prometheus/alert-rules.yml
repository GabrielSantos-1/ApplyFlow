groups:
  - name: applyflow-operational-alerts
    rules:
      - alert: ApplyFlowHighUnauthorizedRate
        expr: sum(rate(applyflow_authorization_total{outcome="unauthorized"}[5m])) by (application) > 8
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Alta taxa de 401"
          description: "A taxa de requests nao autenticadas excedeu baseline de staging por 10m."

      - alert: ApplyFlowHighForbiddenRate
        expr: sum(rate(applyflow_authorization_total{outcome="forbidden"}[5m])) by (application) > 4
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Alta taxa de 403"
          description: "Pode indicar abuso, erro de permissao ou regressao de ownership."

      - alert: ApplyFlowHighRateLimitedRequests
        expr: sum(rate(applyflow_rate_limit_total{outcome="blocked"}[5m])) by (application, policy) > 6
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Aumento de 429"
          description: "Taxa de bloqueio por rate limit acima do threshold por policy."

      - alert: ApplyFlowRateLimitUnavailable
        expr: sum(rate(applyflow_rate_limit_total{outcome="unavailable"}[2m])) by (application) > 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Backend de rate limit indisponivel"
          description: "Redis ou backend de limitacao indisponivel sem fallback efetivo."

      - alert: ApplyFlowRateLimitFallbackActive
        expr: sum(rate(applyflow_rate_limit_fallback_total[5m])) by (application, policy) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Fallback de rate limit ativo"
          description: "Sistema operando com fallback local; consistencia distribuida reduzida."

      - alert: ApplyFlowHigh5xxRate
        expr: sum(rate(http_server_requests_seconds_count{status=~"5..",uri!~"/actuator.*"}[5m])) by (application) > 1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Aumento de erros 5xx"
          description: "Taxa de erros internos acima do threshold."

      - alert: ApplyFlowHighLatencyP95
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(http_server_requests_seconds_bucket{uri!~"/actuator.*",status!~"5.."}[5m])) by (le, application)
          ) > 0.9
          and on(application)
          sum(rate(http_server_requests_seconds_count{uri!~"/actuator.*",status!~"5.."}[5m])) by (application) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Latencia p95 elevada"
          description: "A latencia p95 de requests nao-5xx da API ultrapassou 900ms com volume minimo."

      - alert: ApplyFlowHighLatencyP99
        expr: |
          histogram_quantile(
            0.99,
            sum(rate(http_server_requests_seconds_bucket{uri!~"/actuator.*",status!~"5.."}[5m])) by (le, application)
          ) > 1.5
          and on(application)
          sum(rate(http_server_requests_seconds_count{uri!~"/actuator.*",status!~"5.."}[5m])) by (application) > 1
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Latencia p99 elevada"
          description: "A latencia p99 de requests nao-5xx da API ultrapassou 1.5s com volume minimo."
